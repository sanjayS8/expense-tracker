<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro - Smart Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            color: white;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn.active {
            background: white;
            color: #1e3c72;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            grid-column: 1 / -1;
        }

        button {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(42, 82, 152, 0.3);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9em;
            width: auto;
            margin-right: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card.danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-card.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .filter-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 14px;
            border: 2px solid #2a5298;
            background: white;
            color: #2a5298;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #2a5298;
            color: white;
        }

        .expenses-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .expense-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .expense-item:hover {
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .expense-details {
            flex: 1;
        }

        .expense-category {
            display: inline-block;
            background: #2a5298;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .expense-description {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .expense-date {
            font-size: 0.85em;
            color: #999;
        }

        .expense-amount {
            font-size: 1.4em;
            font-weight: bold;
            color: #2a5298;
            margin: 0 20px;
            min-width: 100px;
            text-align: right;
        }

        .month-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
        }

        .month-header {
            font-size: 1.2em;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-total {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
        }

        .category-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .category-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #e0e0e0;
        }

        .category-emoji {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .category-name {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .category-amount {
            font-size: 1.1em;
            font-weight: bold;
            color: #2a5298;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .tabs {
                flex-direction: column;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-in;
        }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Expense Tracker Pro</h1>
            <p>Smart Analytics for Your Finances</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('add')">➕ Add Expense</button>
            <button class="tab-btn" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('monthly')">📅 Monthly Analysis</button>
            <button class="tab-btn" onclick="switchTab('expenses')">📋 All Expenses</button>
        </div>

        <!-- Tab 1: Add Expense -->
        <div id="add" class="tab-content active">
            <div class="card">
                <h2>➕ Add New Expense</h2>
                <div id="message"></div>
                <form id="expenseForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" placeholder="Enter amount" step="1" min="0" required>
                        </div>

                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="">-- Select Category --</option>
                                <option value="food">🍔 Food & Dining</option>
                                <option value="groceries">🛒 Groceries</option>
                                <option value="transport">🚗 Transport</option>
                                <option value="fuel">⛽ Fuel</option>
                                <option value="entertainment">🎬 Entertainment</option>
                                <option value="shopping">🛍️ Shopping</option>
                                <option value="utilities">💡 Utilities</option>
                                <option value="internet">📡 Internet</option>
                                <option value="healthcare">🏥 Healthcare</option>
                                <option value="gym">💪 Gym/Fitness</option>
                                <option value="education">📚 Education</option>
                                <option value="travel">✈️ Travel</option>
                                <option value="subscription">📱 Subscriptions</option>
                                <option value="rent">🏠 Rent</option>
                                <option value="other">📌 Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" placeholder="Add details..." required></textarea>
                        </div>
                    </div>
                    <button type="submit">✓ Save Expense</button>
                </form>
            </div>
        </div>

        <!-- Tab 2: Dashboard -->
        <div id="dashboard" class="tab-content">
            <div class="card">
                <h2>📊 Dashboard Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Today's Spending</div>
                        <div class="stat-value" id="todayAmount">₹0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">This Month</div>
                        <div class="stat-value" id="monthAmount">₹0</div>
                    </div>
                    <div class="stat-card danger">
                        <div class="stat-label">Total All Time</div>
                        <div class="stat-value" id="totalAmount">₹0</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-label">Average per Day</div>
                        <div class="stat-value" id="averageDaily">₹0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>📈 Category Breakdown (This Month)</h2>
                <div class="chart-container">
                    <canvas id="monthChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>📊 Monthly Trend</h2>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Tab 3: Monthly Analysis -->
        <div id="monthly" class="tab-content">
            <div class="card">
                <h2>📅 Monthly Spending Analysis</h2>
                <div id="monthlyAnalysis"></div>
            </div>
        </div>

        <!-- Tab 4: All Expenses -->
        <div id="expenses" class="tab-content">
            <div class="card">
                <h2>📋 All Expenses</h2>
                <div class="filter-section" id="filterButtons"></div>
                <div class="expenses-list" id="expensesList">
                    <div class="empty-state">No expenses yet</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = {
            food: { name: 'Food & Dining', emoji: '🍔' },
            groceries: { name: 'Groceries', emoji: '🛒' },
            transport: { name: 'Transport', emoji: '🚗' },
            fuel: { name: 'Fuel', emoji: '⛽' },
            entertainment: { name: 'Entertainment', emoji: '🎬' },
            shopping: { name: 'Shopping', emoji: '🛍️' },
            utilities: { name: 'Utilities', emoji: '💡' },
            internet: { name: 'Internet', emoji: '📡' },
            healthcare: { name: 'Healthcare', emoji: '🏥' },
            gym: { name: 'Gym/Fitness', emoji: '💪' },
            education: { name: 'Education', emoji: '📚' },
            travel: { name: 'Travel', emoji: '✈️' },
            subscription: { name: 'Subscriptions', emoji: '📱' },
            rent: { name: 'Rent', emoji: '🏠' },
            other: { name: 'Other', emoji: '📌' }
        };

        let expenses = [];
        let currentFilter = 'all';
        let monthChart, trendChart;

        function initDateInput() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        function loadExpenses() {
            const saved = localStorage.getItem('expenses');
            if (saved) {
                try {
                    expenses = JSON.parse(saved);
                } catch (e) {
                    expenses = [];
                }
            }
        }

        function saveExpenses() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.innerHTML = `<div class="success-message">${text}</div>`;
            setTimeout(() => { msg.innerHTML = ''; }, 3000);
        }

        document.getElementById('expenseForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const amount = parseInt(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            const date = document.getElementById('date').value;

            if (!amount || !category || !description || !date) {
                showMessage('Please fill all fields!');
                return;
            }

            expenses.push({ id: Date.now(), amount, category, description, date });
            saveExpenses();
            renderAll();
            document.getElementById('expenseForm').reset();
            initDateInput();
            showMessage('✅ Expense saved!');
        });

        function deleteExpense(id) {
            if (confirm('Delete this expense?')) {
                expenses = expenses.filter(e => e.id !== id);
                saveExpenses();
                renderAll();
                showMessage('✅ Deleted!');
            }
        }

        function renderAll() {
            updateStats();
            renderMonthlyAnalysis();
            renderExpenses();
            updateCharts();
            renderFilterButtons();
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

            const todayExpenses = expenses.filter(e => e.date === today).reduce((sum, e) => sum + e.amount, 0);
            const monthExpenses = expenses.filter(e => new Date(e.date) >= monthStart).reduce((sum, e) => sum + e.amount, 0);
            const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
            
            const daysWithExpenses = new Set(expenses.map(e => e.date)).size || 1;
            const avgDaily = Math.round(totalExpenses / daysWithExpenses);

            document.getElementById('todayAmount').textContent = `₹${todayExpenses.toLocaleString()}`;
            document.getElementById('monthAmount').textContent = `₹${monthExpenses.toLocaleString()}`;
            document.getElementById('totalAmount').textContent = `₹${totalExpenses.toLocaleString()}`;
            document.getElementById('averageDaily').textContent = `₹${avgDaily.toLocaleString()}`;
        }

        function renderMonthlyAnalysis() {
            const months = {};
            expenses.forEach(e => {
                const date = new Date(e.date);
                const monthKey = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
                if (!months[monthKey]) months[monthKey] = {};
                if (!months[monthKey][e.category]) months[monthKey][e.category] = 0;
                months[monthKey][e.category] += e.amount;
            });

            const html = Object.entries(months)
                .sort((a, b) => new Date(b[0]) - new Date(a[0]))
                .map(([month, cats]) => {
                    const total = Object.values(cats).reduce((a, b) => a + b, 0);
                    const breakdown = Object.entries(cats)
                        .map(([cat, amount]) => `
                            <div class="category-item">
                                <div class="category-emoji">${categories[cat].emoji}</div>
                                <div class="category-name">${categories[cat].name}</div>
                                <div class="category-amount">₹${amount.toLocaleString()}</div>
                            </div>
                        `).join('');
                    return `
                        <div class="month-card">
                            <div class="month-header">
                                <span>${month}</span>
                                <div class="month-total">₹${total.toLocaleString()}</div>
                            </div>
                            <div class="category-breakdown">${breakdown}</div>
                        </div>
                    `;
                }).join('');

            document.getElementById('monthlyAnalysis').innerHTML = html || '<div class="empty-state">No expenses yet</div>';
        }

        function renderFilterButtons() {
            const cats = ['all', ...Object.keys(categories)];
            const html = cats.map(cat => {
                const label = cat === 'all' ? 'All' : categories[cat].emoji + ' ' + categories[cat].name;
                return `<button class="filter-btn ${cat === 'all' ? 'active' : ''}" onclick="filterExpenses('${cat}')">${label}</button>`;
            }).join('');
            document.getElementById('filterButtons').innerHTML = html;
        }

        function filterExpenses(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderExpenses();
        }

        function renderExpenses() {
            const filtered = currentFilter === 'all' ? expenses : expenses.filter(e => e.category === currentFilter);
            const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

            const html = sorted.map(e => `
                <div class="expense-item">
                    <div class="expense-details">
                        <div class="expense-category">${categories[e.category].emoji} ${categories[e.category].name}</div>
                        <div class="expense-description">${e.description}</div>
                        <div class="expense-date">${new Date(e.date).toLocaleDateString()}</div>
                    </div>
                    <div class="expense-amount">₹${e.amount.toLocaleString()}</div>
                    <button class="btn-small" style="background: #2a5298;" onclick="deleteExpense(${e.id})">Delete</button>
                </div>
            `).join('');

            document.getElementById('expensesList').innerHTML = html || '<div class="empty-state">No expenses found</div>';
        }

        function updateCharts() {
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            const monthExpenses = expenses.filter(e => new Date(e.date) >= monthStart);

            const catData = {};
            monthExpenses.forEach(e => {
                catData[e.category] = (catData[e.category] || 0) + e.amount;
            });

            const ctx1 = document.getElementById('monthChart');
            if (monthChart) monthChart.destroy();
            if (Object.keys(catData).length > 0) {
                monthChart = new Chart(ctx1, {
                    type: 'doughnut',
                    data: {
                        labels: Object.entries(catData).map(([k]) => categories[k].name),
                        datasets: [{
                            data: Object.values(catData),
                            backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#FF6384', '#C9CBCF', '#4BC0C0', '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }

            const monthlyData = {};
            expenses.forEach(e => {
                const key = new Date(e.date).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                monthlyData[key] = (monthlyData[key] || 0) + e.amount;
            });

            const ctx2 = document.getElementById('trendChart');
            if (trendChart) trendChart.destroy();
            if (Object.keys(monthlyData).length > 0) {
                trendChart = new Chart(ctx2, {
                    type: 'line',
                    data: {
                        labels: Object.keys(monthlyData),
                        datasets: [{
                            label: 'Monthly Spending',
                            data: Object.values(monthlyData),
                            borderColor: '#2a5298',
                            backgroundColor: 'rgba(42, 82, 152, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        window.addEventListener('DOMContentLoaded', () => {
            initDateInput();
            loadExpenses();
            renderAll();
        });
    </script>
</body>
</html>
